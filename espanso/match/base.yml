matches:
  # Dates
  - trigger: ":today"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%Y-%m-%d"

  # Web
  - trigger: ":gh"
    replace: "https://github.com/edwelker/"
  - trigger: ":li"
    replace: "https://www.linkedin.com/in/edwardwelker/"
  - trigger: ":ew"
    replace: "https://eddiewelker.com"
  - trigger: ":cal"
    replace: "https://calendar.google.com/calendar/"
  - triggers: [":ghs", ":ghsearch"]
    replace: "https://github.com/search?q=$|$"

  # Development
  - trigger: ":py"
    replace: "#!/usr/bin/env python3\n\ndef main():\n    pass\n\nif __name__ == \"__main__\":\n    main()"
  - trigger: ":iso"
    replace: "{{isodate}}"
    vars:
      - name: isodate
        type: date
        params:
          format: "%Y-%m-%dT%H:%M:%S%z"

  # Networking
  - trigger: ":ip"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "curl -s https://ifconfig.me"

  # AI
  - trigger: ":ask"
    replace: "Ask me before you act, and get my permission first."
  - trigger: ":each"
    replace: "Present each option, and get my input before moving to the next."
  - trigger: ":mece"
    replace: "Explain this as MECE, and identify the 5 most likely blindspots we're forgetting."
  - trigger: ":proofread"
    replace: |
      You are a proofreader for posts about to be published.

      1. Identify spelling mistakes and typos
      2. Identify grammar mistakes
      3. Watch out for repeated terms like \'It was interesting that X, and it was interesting that Y\'
      4. Spot any logical errors or factual mistakes
      5. Highlight weak arguments that could be strengthened
      6. Make sure there are no empty or placeholder links
