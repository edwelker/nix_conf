# Font settings
font_family      Inconsolata-Regular
font_size        16.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# Granular Font Size Control
map cmd+equal change_font_size all +1.0
map cmd+plus  change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0     change_font_size all 0

# Shell and Editor
shell /usr/local/bin/bash
editor /usr/local/bin/vim

# Identity: Use xterm-kitty to unlock full features
term xterm-kitty

# Environment Variables
env DOTDOT=/Users/ewelker/bin/nix_conf

# Config Monitoring
watch_config_files /Users/ewelker/bin/nix_conf/kitty/kitty.conf

# Performance and Rendering
sync_to_monitor      yes
input_delay          3
repaint_delay        10
enable_audio_bell    no
visual_bell_duration 0.1
visual_bell_color    #d4a017

# Window Layout
remember_window_size    no
initial_window_width    210c
initial_window_height   55c
window_padding_width    4
hide_window_decorations no
confirm_os_window_close 1

# Borders and UI
active_border_color   #20ae89
inactive_border_color #585260
bell_border_color     #be4678
url_color             #20ae89
url_style             curly

# Colors and Transparency
background_opacity 0.96

# --- ATELIER CAVE DARK THEME ---
background            #19171c
foreground            #8b8792
selection_background  #585260
selection_foreground  #8b8792

# ANSI Colors - Atelier Cave Dark
color0  #19171c
color1  #be4678
color2  #20ae89
color3  #d4a017
color4  #576ddb
color5  #955ae7
color6  #398bc6
color7  #8b8792
color8  #585260
color9  #be4678
color10 #20ae89
color11 #e8b923
color12 #576ddb
color13 #955ae7
color14 #398bc6
color15 #efecf4

# Tab Bar Appearance (Powerline Style)
tab_bar_edge             bottom
tab_bar_margin_height   2.0 2.0
tab_bar_style            powerline
tab_powerline_style      angled
tab_bar_min_tabs         2

# Tab Title Template
tab_title_template      "{index}: {child_process_exe}"

# Tab Colors
active_tab_foreground   #19171c
active_tab_background   #20ae89
active_tab_font_style   bold
inactive_tab_foreground #efecf4
inactive_tab_background #585260
inactive_tab_font_style normal
tab_bar_background       #19171c

# --- CURSOR SETTINGS ---
cursor            #e8b923
cursor_text_color #19171c
cursor_shape      block
cursor_blink_interval 0
shell_integration no-cursor

# Cursor Trail (Comet Effect)
# cursor_trail 3
# cursor_trail_decay 0.1 0.4
# cursor_trail_start_threshold 2

# Scrollback
scrollback_lines 10000
wheel_scroll_multiplier 5.0

# Advanced Settings
allow_remote_control yes
listen_on            unix:/tmp/mykitty
copy_on_select       yes
strip_trailing_spaces smart

# Keyboard Shortcuts - General
map cmd+t        new_tab
map cmd+w        close_tab
map cmd+left    previous_tab
map cmd+right   next_tab
map cmd+1        goto_tab 1
map cmd+2        goto_tab 2
map cmd+3        goto_tab 3
map cmd+4        goto_tab 4
map cmd+5        goto_tab 5

# Search/Vim Integration
map cmd+f launch --stdin-source=@screen_scrollback --type=overlay /usr/local/bin/vim -R -
map cmd+e kitten hints

# Split Management & Zoom
enabled_layouts splits,stack
map cmd+d        launch --location=vsplit
map cmd+shift+d launch --location=hsplit
map cmd+z        toggle_layout stack
map cmd+[        previous_window
map cmd+]        next_window

# Shell Navigation
map ctrl+left  send_text all \x1b[1;5D
map ctrl+right send_text all \x1b[1;5C
map ctrl+up    send_text all \x1b[1;5A
map ctrl+down  send_text all \x1b[1;5B

# Clipboard
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard

# # Clear highlight and send the Escape key to the underlying app
map escape combine : clear_selection : send_text all \x1b

# Mouse
# Ensure Option isn't intercepted by macOS for special characters
macos_option_as_alt yes

# Start rectangular selection
mouse_map cmd+opt+left press grabbed,ungrabbed mouse_selection rectangle
mouse_map opt+left press grabbed,ungrabbed mouse_selection rectangle

# Clear selection outside Vim/Tmux
mouse_map left click ungrabbed clear_selection

# Clear selection inside Tmux/Vim (requires Option key to preserve app mouse features)
mouse_map opt+left click grabbed clear_selection

# Increase the click interval to ensure drags aren't seen as double-clicks
click_interval 0.5
copy_on_select yes
